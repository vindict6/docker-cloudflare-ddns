name: Cloudflare DDNS Update

on:
  schedule:
    # Run every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-dns:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cloudflare-ddns .

      - name: Run Cloudflare DDNS update
        run: |
          docker run --rm \
            -e CF_API_TOKEN="${{ secrets.CF_API_TOKEN }}" \
            -e CF_ZONE_ID="${{ secrets.CF_ZONE_ID }}" \
            -e CF_RECORD_NAME="${{ secrets.CF_RECORD_NAME }}" \
            -e CF_RECORD_TYPE="${{ secrets.CF_RECORD_TYPE }}" \
            -e CF_PROXIED="${{ secrets.CF_PROXIED }}" \
            -e CF_TTL="${{ secrets.CF_TTL }}" \
            cloudflare-ddns
