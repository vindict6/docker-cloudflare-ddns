name: Cloudflare DDNS Update

on:
  schedule:
    # Run every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-dns:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cloudflare-ddns .

      - name: Run Cloudflare DDNS update
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_RECORD_TYPE: ${{ secrets.CF_RECORD_TYPE }}
          CF_PROXIED_RECORDS: ${{ secrets.CF_PROXIED_RECORDS }}
          CF_UNPROXIED_RECORDS: ${{ secrets.CF_UNPROXIED_RECORDS }}
          CF_TTL: ${{ secrets.CF_TTL }}
        run: |
          docker run --rm \
            -e CF_API_TOKEN \
            -e CF_ZONE_ID \
            ${CF_RECORD_TYPE:+-e CF_RECORD_TYPE} \
            ${CF_PROXIED_RECORDS:+-e CF_PROXIED_RECORDS} \
            ${CF_UNPROXIED_RECORDS:+-e CF_UNPROXIED_RECORDS} \
            ${CF_TTL:+-e CF_TTL} \
            cloudflare-ddns
